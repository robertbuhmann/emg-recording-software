<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UniSC EMG Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>UniSC EMG Monitor (3-Channel)</h1>
    <button id="connectBtn">Connect Bluetooth</button>
  </header>

  <main>
    <p id="status" class="status">Not connected.</p>
    <section class="controls">
      <label for="mvcInput">MVC reference (mV):</label>
      <input id="mvcInput" type="number" min="0.1" step="0.1" value="100" />
      <button id="applyMvcBtn">Apply MVC</button>
      <span id="mvcLabel">Current MVC: 100.0 mV</span>
    </section>
    <canvas id="chart" width="1200" height="720"></canvas>
  </main>

  <footer>
    <p>University of the Sunshine Coast – EMG Visualisation Tool</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
