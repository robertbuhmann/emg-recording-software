<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UniSC EMG Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>UniSC EMG Monitor (2 Sensors)</h1>
    <div class="top-actions">
      <button id="connectSensor1Btn">Connect Sensor 1</button>
      <button id="connectSensor2Btn">Connect Sensor 2</button>
      <button id="startVizBtn">Start Viz</button>
      <button id="stopVizBtn">Stop Viz</button>
      <button id="startTrialBtn">Start Trial</button>
      <button id="stopTrialBtn" disabled>Stop Trial & Download</button>
    </div>
  </header>

  <main>
    <p id="status" class="status">Not connected.</p>
    <section class="sensor-controls">
      <div class="sensor-card">
        <h3>Sensor 1</h3>
        <label for="mvcInput1">MVC (mV)</label>
        <input id="mvcInput1" type="number" min="0.1" step="0.1" value="100" />
        <div class="metric">Window max RMS: <span id="maxRms1">0.0 mV</span></div>
      </div>
      <div class="sensor-card">
        <h3>Sensor 2</h3>
        <label for="mvcInput2">MVC (mV)</label>
        <input id="mvcInput2" type="number" min="0.1" step="0.1" value="100" />
        <div class="metric">Window max RMS: <span id="maxRms2">0.0 mV</span></div>
      </div>
    </section>
    <canvas id="chart" width="1400" height="780"></canvas>
  </main>

  <footer>
    <p>University of the Sunshine Coast – EMG Visualisation Tool</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
